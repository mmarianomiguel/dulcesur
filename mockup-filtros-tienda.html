<style>

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
  .scrollbar-hide::-webkit-scrollbar{display:none}
  .scrollbar-hide{scrollbar-width:none}
  /* Accordion animation */
  .acc-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .acc-body.open{max-height:500px}
  /* Checkbox */
  .cb{width:18px;height:18px;border:2px solid #d1d5db;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
  .cb.checked{background:#7C3AED;border-color:#7C3AED}
  .cb.checked svg{display:block}
  .cb svg{display:none;width:12px;height:12px;color:white}
  /* Mobile frame */
  .mob-frame{width:390px;margin:30px auto;border:6px solid #111;border-radius:40px;overflow:hidden;height:780px;position:relative;background:white;box-shadow:0 25px 60px rgba(0,0,0,.18)}

  .mob-scroll{height:calc(100% - 21px);overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
  .mob-scroll::-webkit-scrollbar{display:none}
</style>

<!-- Control bar -->
<div class="sticky top-0 z-[100] bg-[#111] text-white flex items-center justify-center gap-4 px-4 py-3 text-sm shadow-lg">

            Arcor <svg class="w-3 h-3 text-gray-400 group-hover:text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

              <button onclick="toggleAcc(this)" class="acc-head flex items-center justify-between w-full px-4 py-3 text-[13px] font-semibold text-gray-800">Categorías<svg class="w-4 h-4 text-gray-400 transition-transform acc-arrow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
              <div class="acc-body open"><div class="px-4 pb-3 space-y-0.5">
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb checked" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1 font-medium text-gray-900">Golosinas</span><span class="text-[11px] text-gray-400">54</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">Chocolates</span><span class="text-[11px] text-gray-400">38</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">Bebidas</span><span class="text-[11px] text-gray-400">29</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">Snacks</span><span class="text-[11px] text-gray-400">24</span></label>
              </div></div>
            </div>
            <!-- Marcas -->
            <div class="border-b border-gray-100">
              <button onclick="toggleAcc(this)" class="acc-head flex items-center justify-between w-full px-4 py-3 text-[13px] font-semibold text-gray-800">Marcas<svg class="w-4 h-4 text-gray-400 transition-transform acc-arrow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
              <div class="acc-body open"><div class="px-4 pb-3 space-y-0.5">
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb checked" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1 font-medium text-gray-900">Arcor</span><span class="text-[11px] text-gray-400">42</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">Georgalos</span><span class="text-[11px] text-gray-400">18</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">Felfort</span><span class="text-[11px] text-gray-400">15</span></label>

            <!-- Precio -->

              <button onclick="toggleAcc(this)" class="acc-head flex items-center justify-between w-full px-4 py-3 text-[13px] font-semibold text-gray-800">Precio<svg class="w-4 h-4 text-gray-400 transition-transform acc-arrow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>

                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">$5.000 a $10.000</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">$10.000 a $20.000</span></label>
                <label class="flex items-center gap-3 py-1.5 px-2 rounded-md text-[13px] text-gray-600 cursor-pointer"><div class="cb" onclick="event.stopPropagation();this.classList.toggle('checked')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="flex-1">Más de $20.000</span></label>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const products=[
    {emoji:'🍫',name:'Bon o Bon x30',brand:'Arcor',price:8450,badge:null,stock:true},
    {emoji:'🍬',name:'Mogul Gomitas x500g',brand:'Arcor',price:5200,badge:'-15%',stock:true},
    {emoji:'🥤',name:'Coca-Cola 2.25L x6',brand:'Coca-Cola',price:12800,badge:null,stock:true},
    {emoji:'🍪',name:'Pepitos Chips x3',brand:'Bagley',price:4350,badge:null,stock:true},
    {emoji:'🧁',name:'Alfajor Jorgito x24',brand:'Georgalos',price:15600,badge:'NUEVO',stock:true},
    {emoji:'🍭',name:'Chupetín Push Pop x12',brand:'Arcor',price:6900,badge:null,stock:true},
    {emoji:'🍩',name:'Rhodesia x36',brand:'Felfort',price:9800,badge:'-10%',stock:true},
    {emoji:'🥜',name:'Maní con Choc. x1kg',brand:'Georgalos',price:7200,badge:null,stock:false},
  ];
  function fmt(n){return '$'+n.toLocaleString('es-AR')}
  function card(p){
    const bc=p.badge==='NUEVO'?'bg-blue-500':'bg-primary';
    return `<div class="group bg-white rounded-xl overflow-hidden border border-gray-200/80 hover:shadow-md hover:border-gray-300 transition-all duration-200 flex flex-col">
      <div class="relative"><div class="aspect-[4/3] bg-gradient-to-b from-gray-50 to-white flex items-center justify-center overflow-hidden"><span class="text-5xl group-hover:scale-105 transition-transform duration-300">${p.emoji}</span>${!p.stock?'<div class="absolute inset-0 bg-white/50 backdrop-blur-[1px] flex items-center justify-center"><span class="bg-white text-gray-500 text-xs font-medium px-3 py-1.5 rounded-lg shadow-sm border border-gray-200">Agotado</span></div>':''}</div>${p.badge?`<span class="absolute top-2 left-2 ${bc} text-white text-[10px] font-bold px-2 py-0.5 rounded">${p.badge}</span>`:''}</div>
      <div class="flex flex-col flex-1 p-3"><p class="text-[11px] text-gray-400 font-medium uppercase tracking-wide">${p.brand}</p><h3 class="text-[13px] font-medium text-gray-800 leading-snug mt-0.5 mb-2 line-clamp-2">${p.name}</h3>
      <div class="mt-auto"><div class="text-lg font-bold text-gray-900 mb-2">${fmt(p.price)}</div>
      ${p.stock?`<button class="w-full bg-primary hover:bg-primary/90 text-white text-[13px] py-2.5 rounded-lg font-semibold transition-colors">Agregar</button>`:'<div class="w-full text-center text-gray-400 text-xs py-2.5 font-medium">Sin stock</div>'}</div></div></div>`;
  }
  document.getElementById('gridD').innerHTML=products.map(card).join('');
  document.getElementById('gridM').innerHTML=products.map(card).join('');

  // Device toggle
  function setDevice(d){
    document.getElementById('desktopView').classList.toggle('hidden',d!=='desktop');
    document.getElementById('mobileView').classList.toggle('hidden',d!=='mobile');
    document.getElementById('dD').classList.toggle('bg-white/10',d==='desktop');
    document.getElementById('dD').classList.toggle('border-white/20',d==='desktop');
    document.getElementById('dD').classList.toggle('text-gray-400',d!=='desktop');
    document.getElementById('dM').classList.toggle('bg-white/10',d==='mobile');
    document.getElementById('dM').classList.toggle('border-white/20',d==='mobile');
    document.getElementById('dM').classList.toggle('text-gray-400',d!=='mobile');
  }

  // Accordion toggle
  function toggleAcc(btn){
    const body=btn.nextElementSibling;
    body.classList.toggle('open');
    btn.querySelector('.acc-arrow').classList.toggle('rotate-180');
  }
</script>
</body>
</html>
